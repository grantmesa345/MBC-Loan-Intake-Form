<!DOCTYPE html>
<!-- MBC Deal Review — admin.html (Grant's private download page) -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MBC — Deal Review</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --black:     #000000;
      --blue:      #009CDE;
      --orange:    #E87722;
      --dk-orange: #CB6015;
      --lt-blue:   #62B5E5;
      --gray:      #D0D3D4;
      --off-white: #F4F6F9;
      --text:      #1a1a1a;
      --muted:     #6b7280;
      --border:    #dde2ea;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto', sans-serif;
      background: var(--off-white);
      color: var(--text);
      min-height: 100vh;
      padding: 36px 16px 64px;
    }
    .page-wrapper { max-width: 840px; margin: 0 auto; }

    /* ── Header ── */
    .header { background: var(--black); border-radius: 10px 10px 0 0; overflow: hidden; }
    .header-top { padding: 28px 40px 22px; display: flex; align-items: center; gap: 20px; }
    .logo-wrap { width: 64px; height: 64px; flex-shrink: 0; }
    .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
    .header-text h1 { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 0.3px; }
    .header-text p  { font-size: 13px; font-weight: 300; color: var(--lt-blue); margin-top: 2px; }
    .header-bar { height: 4px; background: linear-gradient(90deg, var(--orange) 0%, var(--blue) 100%); }

    /* ── Action bar ── */
    .action-bar {
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 18px 40px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px;
    }
    .action-bar .meta { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .action-bar .meta strong { color: var(--black); font-weight: 600; font-size: 15px; }

    .btn-download {
      background: var(--orange); color: #fff;
      font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: 700;
      padding: 11px 28px; border: none; border-radius: 7px;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: background 0.2s; white-space: nowrap;
    }
    .btn-download:hover    { background: var(--dk-orange); }
    .btn-download:disabled { background: var(--gray); cursor: not-allowed; }
    .btn-download svg { width: 16px; height: 16px; }

    .btn-print {
      background: transparent; color: var(--black);
      font-family: 'Roboto', sans-serif; font-size: 13px; font-weight: 500;
      padding: 9px 18px; border: 1.5px solid var(--black); border-radius: 7px;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .btn-print:hover { background: var(--black); color: #fff; }

    /* ── Cards ── */
    .card { background: #fff; border-top: 1px solid var(--border); padding: 24px 40px; }
    .card:last-of-type { border-radius: 0 0 10px 10px; }

    .section-title {
      font-size: 13px; font-weight: 700; color: var(--black);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 16px; padding-bottom: 8px;
      border-bottom: 2px solid var(--orange);
      display: flex; align-items: center; gap: 8px;
    }
    .section-num {
      background: var(--black); color: #fff;
      font-size: 10px; font-weight: 700;
      width: 20px; height: 20px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ── Field grid ── */
    .field-grid { display: grid; grid-template-columns: 220px 1fr; }
    .field-row  { display: contents; }
    .field-row .lbl {
      font-size: 13px; font-weight: 500; color: var(--muted);
      padding: 9px 12px 9px 0; border-bottom: 1px solid var(--off-white);
    }
    .field-row .val {
      font-size: 13px; color: var(--text);
      padding: 9px 0 9px 12px; border-bottom: 1px solid var(--off-white);
    }
    .field-row .val:empty::before { content: '—'; color: var(--gray); }
    .field-row .val.strong { color: var(--black); font-weight: 600; }

    /* ── Excel cell badge ── */
    .cell-tag {
      display: inline-block; background: #e8f4e8; color: #166534;
      font-size: 11px; font-weight: 600; font-family: monospace;
      padding: 1px 5px; border-radius: 3px; margin-left: 5px; vertical-align: middle;
    }

    /* ── Sub-divider ── */
    .sub-divider { border: none; border-top: 1px dashed var(--border); margin: 14px 0 10px; }

    /* ── No data ── */
    .no-data { background: #fff; border-radius: 0 0 10px 10px; padding: 60px 40px; text-align: center; }
    .no-data h2 { font-size: 20px; font-weight: 600; color: var(--black); }
    .no-data p  { font-size: 14px; color: var(--muted); margin-top: 10px; max-width: 400px; margin-inline: auto; line-height: 1.6; }

    /* ── Toast ── */
    #toast {
      display: none; position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #166534; color: #fff; padding: 12px 24px; border-radius: 8px;
      font-size: 14px; font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,.15); z-index: 9999;
    }

    @media(max-width:640px) {
      .card, .action-bar, .header-top { padding-left: 20px; padding-right: 20px; }
      .field-grid { grid-template-columns: 150px 1fr; }
    }
  </style>
</head>

<script>
// ── Cell mapping: form field → Deal Details column C ──
// C14 ("Borrower") and C33 ("Value") are header rows — left blank intentionally
const CELL_MAP = {
  'C3':  d => d.property_name || d.property_address?.split(',')[0]?.trim() || '',
  'C4':  d => parseState(d.property_address),
  'C5':  d => parseCity(d.property_address),
  'C6':  d => d.property_address || '',
  'C9':  d => parseNumber(d.land_area),
  'C10': d => parseNumber(d.units_lots),
  'C11': d => d.property_type || '',
  'C12': d => d.current_status || '',
  'C13': d => d.use_of_funds || '',
  'C15': d => d.sponsor_names || '',
  'C16': d => d.entity_name || '',
  'C18': d => parseNumber(d.liquidity),
  'C27': d => parseMonths(d.loan_term),
  'C28': d => parseNumber(d.net_proceeds),
  'C34': d => parseNumber(d.projected_value),
  'C36': d => {
    const val = parseNumber(d.projected_value), units = parseNumber(d.units_lots);
    return (val && units > 0) ? val / units : (val || '');
  }
};

function parseNumber(str) {
  if (!str) return '';
  const n = parseFloat(String(str).replace(/[$,\s]/g,'').replace(/[^0-9.-]/g,''));
  return isNaN(n) ? '' : n;
}
function parseMonths(str) {
  if (!str) return 12;
  const m = String(str).match(/(\d+)/);
  return m ? parseInt(m[1]) : 12;
}
function parseState(addr) {
  if (!addr) return '';
  const m = addr.match(/,\s*([A-Z]{2})\s*\d{5}/);
  if (m) return m[1];
  const p = addr.split(',');
  return p.length >= 3 ? p[p.length-2].trim().split(' ').pop() : '';
}
function parseCity(addr) {
  if (!addr) return '';
  const p = addr.split(',');
  return p.length >= 2 ? p[p.length - (p.length >= 3 ? 2 : 1)].trim() : '';
}
function loadData() {
  const hash = window.location.hash.slice(1);
  if (!hash) return null;
  try { return JSON.parse(decodeURIComponent(escape(atob(hash)))); }
  catch(e) { return null; }
}
function fmt(val) {
  if (!val) return '';
  const n = parseFloat(String(val).replace(/[$,]/g,''));
  return isNaN(n) ? val : '$' + n.toLocaleString('en-US');
}

function row(label, value, isStrong=false, cell='') {
  const badge = cell ? `<span class="cell-tag">→ ${cell}</span>` : '';
  return `<div class="field-row">
    <div class="lbl">${label}${badge}</div>
    <div class="val${isStrong?' strong':''}">${value || ''}</div>
  </div>`;
}

function renderData(d) {
  const submitted = d.submitted_at
    ? new Date(d.submitted_at).toLocaleString('en-US', {dateStyle:'full', timeStyle:'short'})
    : '';
  const projectLabel = d.property_name || d.property_address || d.entity_name || 'Untitled';
  const addlCash = d.additional_cash === 'Yes'
    ? `Yes${d.additional_cash_amount ? ' — ' + fmt(d.additional_cash_amount) : ''}`
    : (d.additional_cash || '');

  document.getElementById('content').innerHTML = `
    <div class="action-bar">
      <div class="meta">
        <strong>${projectLabel}</strong><br/>
        ${d.sponsor_names || ''}${d.entity_name ? ' &nbsp;·&nbsp; ' + d.entity_name : ''}<br/>
        <span style="font-size:12px">Submitted: ${submitted}</span>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <button class="btn-print" onclick="window.print()">Print / Save PDF</button>
        <button class="btn-download" id="dlBtn" onclick="downloadExcel()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 4v12M8 12l4 4 4-4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Download Deal Details Excel
        </button>
      </div>
    </div>

    <div class="card">
      <div class="section-title"><span class="section-num">1</span>Borrower Information</div>

async function downloadExcel() {
  const btn = document.getElementById('dlBtn');
  btn.disabled = true;
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M12 4v12M8 12l4 4 4-4" stroke-linecap="round" stroke-linejoin="round"/></svg> Preparing…`;

  const d = loadData();
  if (!d) { btn.disabled = false; return; }

  try {
    const res = await fetch('./template.xlsx');
    if (!res.ok) throw new Error(`Could not load template.xlsx (${res.status}). Make sure template.xlsx is in the same GitHub folder.`);

    const wb = XLSX.read(new Uint8Array(await res.arrayBuffer()), { type:'array', cellFormula:true, cellStyles:true });
    const ws = wb.Sheets['Deal Details'];
    if (!ws) throw new Error('Sheet "Deal Details" not found.');

    for (const [cell, fn] of Object.entries(CELL_MAP)) {
      const value = fn(d);
      if (value === '' || value == null) continue;
      if (!ws[cell]) ws[cell] = {};
      if (typeof value === 'number') {
        ws[cell].t = 'n'; ws[cell].v = value; ws[cell].w = value.toLocaleString();
      } else {
        ws[cell].t = 's'; ws[cell].v = String(value); ws[cell].w = String(value);
      }
      delete ws[cell].f;
    }

    const slug = (d.property_name || d.entity_name || 'Deal')
      .replace(/[^a-zA-Z0-9 ]/g,'').trim().replace(/\s+/g,'_');
    const filename = `MBC_DD_${slug}_${new Date().toISOString().slice(0,10)}.xlsx`;

    const blob = new Blob([XLSX.write(wb, {bookType:'xlsx', type:'array'})],
      {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const a = Object.assign(document.createElement('a'), {href: URL.createObjectURL(blob), download: filename});
    a.click(); URL.revokeObjectURL(a.href);

    const toast = document.getElementById('toast');
    toast.textContent = `✓ Downloaded: ${filename}`;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 4000);

    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 4v12M8 12l4 4 4-4" stroke-linecap="round" stroke-linejoin="round"/></svg> Download Deal Details Excel`;

  } catch(err) {
    alert('Error: ' + err.message);
    btn.disabled = false;
    btn.innerHTML = 'Retry Download';
  }
}

function renderNoData() {
  document.getElementById('content').innerHTML = `
    <div class="no-data">
      <h2>No Submission Loaded</h2>
      <p>This page loads automatically when you click the link in your email notification from a borrower submission.</p>
    </div>`;
}

const data = loadData();
data ? renderData(data) : renderNoData();
